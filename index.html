<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>

    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="calculator">

        <div class="display">
            <input type="text" id="screen" readonly>
        </div>

        <div class="buttons">

            <button class="special" onclick="clearScreen()">AC</button>
            <button class="special" onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="append('/')">÷</button>
            <button class="operator" onclick="append('*')">×</button>

            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button class="operator" onclick="append('-')">−</button>

            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button class="operator" onclick="append('+')">+</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>

            <button class="equal" onclick="calculate()" rowspan="2">=</button>

            <button class="zero" onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
